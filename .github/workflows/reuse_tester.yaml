name: reuse-tester
on: 
  workflow_call:
    inputs:
      dotnet-version:
        description: 'The .NET SDK version to use for testing'
        type: string
        required: true
jobs:
  test:
    runs-on:
      - codebuild-Webapitest-${{ github.run_id }}-${{ github.run_attempt }}
      
    steps:
      - name: checkout
        uses: actions/checkout@v3         
      - name: Setup .NET SDK  
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
      - name: Restore dependencies
        run: dotnet restore               
      - name: Build
        run: dotnet build                 
      - name: Test
        run: dotnet test 
      - name: Publish a Echo
        run: echo "Test for this completed successfully for .NET SDK version ${{ inputs.dotnet-version }} on run ${{ github.run_id }} and attempt ${{ github.run_attempt }}"

  